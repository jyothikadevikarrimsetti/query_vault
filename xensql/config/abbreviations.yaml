# Terminology Expansion Map for XenSQL Question Understanding
# Used by TerminologyExpander to additively expand abbreviations.
# The original term is KEPT; the expansion is APPENDED in parentheses.
#
# Organized by domain. Each domain section can be loaded independently.

healthcare:
  # Identifiers
  MRN: "medical record number"
  DOB: "date of birth"
  NPI: "national provider identifier"
  EIN: "employer identification number"

  # Vital Signs
  BP: "blood pressure"
  HR: "heart rate"
  RR: "respiratory rate"
  SpO2: "oxygen saturation"
  BMI: "body mass index"
  Temp: "temperature"

  # Laboratory
  CBC: "complete blood count"
  BMP: "basic metabolic panel"
  CMP: "comprehensive metabolic panel"
  BUN: "blood urea nitrogen"
  A1C: "hemoglobin A1C glycated hemoglobin"
  HbA1c: "hemoglobin A1C glycated hemoglobin"
  INR: "international normalized ratio"
  PT: "prothrombin time"
  PTT: "partial thromboplastin time"
  WBC: "white blood cell count"
  RBC: "red blood cell count"
  Hgb: "hemoglobin"
  Hct: "hematocrit"
  TSH: "thyroid stimulating hormone"
  PSA: "prostate specific antigen"
  BNP: "brain natriuretic peptide"
  CRP: "C-reactive protein"
  ESR: "erythrocyte sedimentation rate"
  LDL: "low density lipoprotein"
  HDL: "high density lipoprotein"
  GFR: "glomerular filtration rate"
  eGFR: "estimated glomerular filtration rate"
  ABG: "arterial blood gas"
  ALT: "alanine aminotransferase"
  AST: "aspartate aminotransferase"
  BGA: "blood gas analysis"
  Lytes: "electrolytes"
  Trigs: "triglycerides"
  HCG: "human chorionic gonadotropin"
  AFP: "alpha fetoprotein"
  ESR: "erythrocyte sedimentation rate"
  UA: "urinalysis"

  # Coding Systems
  ICD: "diagnosis code ICD-10"
  CPT: "procedure code CPT"
  DRG: "diagnosis related group"
  NDC: "national drug code"
  LOINC: "logical observation identifiers names and codes"
  SNOMED: "systematized nomenclature of medicine"
  RxNorm: "normalized prescription drug names"
  HCPCS: "healthcare common procedure coding system"

  # Departments / Locations
  ICU: "intensive care unit"
  ER: "emergency room emergency department"
  ED: "emergency department"
  OR: "operating room"
  PACU: "post anesthesia care unit"
  NICU: "neonatal intensive care unit"
  PICU: "pediatric intensive care unit"
  L&D: "labor and delivery"
  OB: "obstetrics"
  GYN: "gynecology"
  OBGYN: "obstetrics and gynecology"
  SNF: "skilled nursing facility"
  ASC: "ambulatory surgery center"
  LTAC: "long term acute care"

  # Clinical Shorthand
  Dx: "diagnosis"
  Rx: "prescription medication"
  Tx: "treatment"
  Hx: "history"
  Sx: "symptoms"
  Px: "prognosis"
  Fx: "fracture"
  Bx: "biopsy"
  SOB: "shortness of breath"
  HTN: "hypertension"
  DM: "diabetes mellitus"
  CHF: "congestive heart failure"
  COPD: "chronic obstructive pulmonary disease"
  CAD: "coronary artery disease"
  MI: "myocardial infarction"
  CVA: "cerebrovascular accident stroke"
  DVT: "deep vein thrombosis"
  PE: "pulmonary embolism"
  UTI: "urinary tract infection"
  MRSA: "methicillin resistant staphylococcus aureus"

  # Imaging
  EKG: "electrocardiogram"
  ECG: "electrocardiogram"
  CT: "computed tomography"
  MRI: "magnetic resonance imaging"
  PET: "positron emission tomography"
  US: "ultrasound"
  CXR: "chest x-ray"
  XR: "x-ray"

  # Administrative
  LOS: "length of stay"
  AMA: "against medical advice"
  EMR: "electronic medical record"
  EHR: "electronic health record"
  PCP: "primary care provider"
  FTE: "full time equivalent"
  RVU: "relative value unit"
  ADT: "admission discharge transfer"
  CMO: "chief medical officer"
  CNO: "chief nursing officer"

finance:
  # Statements & Reporting
  P&L: "profit and loss"
  PnL: "profit and loss"
  EBITDA: "earnings before interest taxes depreciation and amortization"
  EBIT: "earnings before interest and taxes"
  EPS: "earnings per share"
  ROI: "return on investment"
  ROE: "return on equity"
  ROA: "return on assets"
  ROIC: "return on invested capital"
  CAGR: "compound annual growth rate"
  YoY: "year over year"
  MoM: "month over month"
  QoQ: "quarter over quarter"
  YTD: "year to date"
  MTD: "month to date"
  QTD: "quarter to date"
  TTM: "trailing twelve months"

  # Assets & Portfolio
  AUM: "assets under management"
  NAV: "net asset value"
  ABS: "asset backed securities"
  MBS: "mortgage backed securities"
  CDO: "collateralized debt obligation"
  ETF: "exchange traded fund"
  IPO: "initial public offering"
  M&A: "mergers and acquisitions"

  # Accounting
  GAAP: "generally accepted accounting principles"
  IFRS: "international financial reporting standards"
  CAPEX: "capital expenditure"
  OPEX: "operating expenditure"
  AR: "accounts receivable"
  AP: "accounts payable"
  GL: "general ledger"
  COGS: "cost of goods sold"
  SGA: "selling general and administrative"
  WC: "working capital"
  DCF: "discounted cash flow"
  NPV: "net present value"
  IRR: "internal rate of return"

  # Risk & Compliance
  KPI: "key performance indicator"
  KRI: "key risk indicator"
  VaR: "value at risk"
  LTV: "loan to value"
  DTI: "debt to income"
  NIM: "net interest margin"
  NPA: "non performing assets"
  NPL: "non performing loans"
  CET1: "common equity tier 1"
  LCR: "liquidity coverage ratio"
  NSFR: "net stable funding ratio"

  # Revenue & Billing
  ARR: "annual recurring revenue"
  MRR: "monthly recurring revenue"
  ARPU: "average revenue per user"
  CAC: "customer acquisition cost"
  CLV: "customer lifetime value"
  LTV: "lifetime value"
  GMV: "gross merchandise value"
  NRR: "net revenue retention"
  GRR: "gross revenue retention"
  ASP: "average selling price"
  AOV: "average order value"
  Rev: "revenue"
  GP: "gross profit"
