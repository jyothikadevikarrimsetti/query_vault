apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xensql-queryvault-ingress
  namespace: xensql-queryvault
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "PUT, GET, POST, OPTIONS, DELETE"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.example.com
      secretName: xensql-queryvault-tls
  rules:
    - host: api.example.com
      http:
        paths:
          # ── XenSQL routes ────────────────────────────────────
          - path: /api/v1/pipeline
            pathType: Prefix
            backend:
              service:
                name: xensql
                port:
                  number: 8900

          # ── QueryVault routes ────────────────────────────────
          - path: /api/v1/gateway
            pathType: Prefix
            backend:
              service:
                name: queryvault
                port:
                  number: 8950

          - path: /api/v1/compliance
            pathType: Prefix
            backend:
              service:
                name: queryvault
                port:
                  number: 8950

          - path: /api/v1/threat
            pathType: Prefix
            backend:
              service:
                name: queryvault
                port:
                  number: 8950

          - path: /api/v1/alerts
            pathType: Prefix
            backend:
              service:
                name: queryvault
                port:
                  number: 8950
