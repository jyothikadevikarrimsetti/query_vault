apiVersion: apps/v1
kind: Deployment
metadata:
  name: queryvault
  namespace: xensql-queryvault
  labels:
    app: queryvault
    product: queryvault
spec:
  replicas: 2
  selector:
    matchLabels:
      app: queryvault
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: queryvault
        product: queryvault
    spec:
      containers:
        - name: queryvault
          image: queryvault:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8950
              protocol: TCP
          envFrom:
            - configMapRef:
                name: shared-config
            - secretRef:
                name: db-secrets
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8950
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8950
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: queryvault
  namespace: xensql-queryvault
  labels:
    app: queryvault
spec:
  type: ClusterIP
  selector:
    app: queryvault
  ports:
    - protocol: TCP
      port: 8950
      targetPort: 8950
