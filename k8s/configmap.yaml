apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-config
  namespace: xensql-queryvault
  labels:
    app.kubernetes.io/part-of: ai-security
data:
  # ── Application ────────────────────────────────────────────
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "*"

  # ── Redis ──────────────────────────────────────────────────
  REDIS_URL: "redis://redis:6379/0"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # ── Neo4j ──────────────────────────────────────────────────
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_DATABASE: "neo4j"
  NEO4J_USERNAME: "neo4j"

  # ── PostgreSQL (pgvector) ──────────────────────────────────
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "ai_security"
  POSTGRES_USER: "ai_security"
  POSTGRES_SSLMODE: "disable"

  # ── Inter-service URLs ─────────────────────────────────────
  XENSQL_URL: "http://xensql:8900"
  QUERYVAULT_URL: "http://queryvault:8950"

  # ── Azure OpenAI ───────────────────────────────────────────
  AZURE_AI_ENDPOINT: "REPLACE_WITH_AZURE_AI_ENDPOINT"
  AZURE_OPENAI_DEPLOYMENT: "REPLACE_WITH_AZURE_OPENAI_DEPLOYMENT"
  AZURE_OPENAI_FALLBACK_DEPLOYMENT: "REPLACE_WITH_AZURE_OPENAI_FALLBACK_DEPLOYMENT"

  # ── Identity Provider ──────────────────────────────────────
  IDP_AUDIENCE: "REPLACE_WITH_IDP_AUDIENCE"
  IDP_ISSUER: "REPLACE_WITH_IDP_ISSUER"
  IDP_JWKS_URI: "REPLACE_WITH_IDP_JWKS_URI"
  USE_MOCK_IDP: "false"

  # ── Vault ──────────────────────────────────────────────────
  VAULT_ADDR: "REPLACE_WITH_VAULT_ADDR"
