name: CI (Continuous Integration)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { dir: "queryvault", image: "ai_security_v2-queryvault" }
          - { dir: "xensql", image: "ai_security_v2-xensql" }
          - { dir: "dashboard", image: "ai_security_v2-dashboard" }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Verify Docker Login
        run: docker info

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.dir }}
          push: true
          tags: |
            jyothika2832/${{ matrix.service.image }}:latest
            jyothika2832/${{ matrix.service.image }}:${{ github.sha }}

