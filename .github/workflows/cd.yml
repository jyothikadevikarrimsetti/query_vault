name: CD (Deploy to Azure VM)

on:
  workflow_run:
    workflows: ["CI (Continuous Integration)"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy docker-compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: "docker-compose.yaml"
          target: "/home/${{ secrets.AZURE_VM_USER }}/ai-security-app/"

      - name: SSH into VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            set -e
            APP_DIR=/home/${{ secrets.AZURE_VM_USER }}/ai-security-app
            SHA=${{ github.event.workflow_run.head_sha }}
            cd $APP_DIR

            echo "🔐 Docker login..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

            echo "⬇️ Pull images..."
            docker pull jyothika2832/ai_security_v2-queryvault:$SHA
            docker pull jyothika2832/ai_security_v2-xensql:$SHA
            docker pull jyothika2832/ai_security_v2-dashboard:$SHA

            echo "🔄 Update compose..."
            sed -i "s|ai_security_v2-queryvault:.*|ai_security_v2-queryvault:$SHA|g" docker-compose.yaml
            sed -i "s|ai_security_v2-xensql:.*|ai_security_v2-xensql:$SHA|g" docker-compose.yaml
            sed -i "s|ai_security_v2-dashboard:.*|ai_security_v2-dashboard:$SHA|g" docker-compose.yaml

            echo "🚀 Deploy..."
            docker compose up -d --force-recreate || docker-compose up -d --force-recreate
            
            echo "🔍 Checking services..."
            docker ps

            echo "🌐 Health check..."
            curl -f http://localhost:3000 || exit 1

            echo "🧹 Cleanup..."
            docker image prune -f

            echo "✅ Deployment complete 🚀"
