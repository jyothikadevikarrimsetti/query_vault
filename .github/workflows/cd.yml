name: CD (Continuous Deployment)

on:
  workflow_run:
    workflows: ["CI (Continuous Integration)"]
    types:
      - completed

jobs:
  cd:
    name: Continuous Deployment (Release)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        
      - name: Configure Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Prepare Kubernetes Manifests
        run: |
          # 3. Replace 'latest' tag with the SHA built in CI across ALL deployment files
          sed -i "s|jyothikadevikarrimsetti/\([a-zA-Z0-9-]*\):latest|jyothikadevikarrimsetti/\1:${{ github.event.workflow_run.head_sha }}|g" k8s/*.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml || true
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets.yaml
          
          # Apply everything else (Deployments, Services, etc)
          kubectl apply -f k8s/
          
          # Wait for essential services
          kubectl rollout status deployment/queryvault -n xensql-queryvault
          kubectl rollout status deployment/xensql -n xensql-queryvault
          kubectl rollout status deployment/dashboard -n xensql-queryvault
