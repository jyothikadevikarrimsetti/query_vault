name: CD (Deploy to Azure VM)

on:
  workflow_run:
    workflows: ["CI (Continuous Integration)"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy docker-compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.AZURE_VM_USER }}/ai-security-app/"

      - name: SSH into VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            set -e
            APP_DIR=/home/${{ secrets.AZURE_VM_USER }}/ai-security-app
            SHA=${{ github.event.workflow_run.head_sha }}
            cd $APP_DIR

            echo "🔐 Docker login..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

            echo "⬇️ Pull images..."
            docker pull jyothika2832/ai_security_v3-queryvault:$SHA
            docker pull jyothika2832/ai_security_v3-xensql:$SHA
            docker pull jyothika2832/ai_security_v3-dashboard:$SHA

            echo "🔄 Update compose..."
            # Update the image tags in the yml file
            sed -i "s|ai_security_v3-queryvault:.*|ai_security_v3-queryvault:$SHA|g" docker-compose.yml
            sed -i "s|ai_security_v3-xensql:.*|ai_security_v3-xensql:$SHA|g" docker-compose.yml
            sed -i "s|ai_security_v3-dashboard:.*|ai_security_v3-dashboard:$SHA|g" docker-compose.yml

            echo "🚀 Deploy..."
            # Force using the specific file and recreate
            docker compose -f docker-compose.yml up -d --force-recreate
            
            echo "🌱 Seeding data..."
            # Wait for DBs to be ready
            sleep 10
            docker exec -i target-postgres psql -U sentinelsql -d sentinelsql < scripts/seed_sample_data_postgres.sql || echo "Postgres seeding skipped..."
            docker exec -i target-mysql mysql -u sentinelsql -p1234 sentinelsql < scripts/seed_sample_data_mysql.sql || echo "MySQL seeding skipped..."

            echo "🕷️ Crawling databases..."
            # Trigger XenSQL to index the databases
            sleep 5
            curl -X POST http://localhost:8900/api/v1/schema/crawl || echo "Crawl trigger failed..."
            
            echo "🔍 Checking services..."
            docker ps

            echo "🌐 Health check..."
            # Try port 3002 (v3)
            curl -f http://localhost:3000 || exit 1

            echo "🧹 Cleanup..."
            docker image prune -f

            echo "✅ Deployment complete 🚀"
