server {
    listen 3001;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static frontend files and fallback to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /xensql requests to the xensql container and strip the /xensql prefix
    location /xensql/ {
        proxy_pass http://xensql:8900/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy /queryvault requests to the queryvault container and strip the /queryvault prefix
    location /queryvault/ {
        proxy_pass http://queryvault:8950/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
